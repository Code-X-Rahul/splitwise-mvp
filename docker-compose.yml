version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: express_sequelize_db
    environment:
      POSTGRES_USER: splitwise_mvp
      POSTGRES_PASSWORD: splitwise_mvp
      POSTGRES_DB: splitwise_mvp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
